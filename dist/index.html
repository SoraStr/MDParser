<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDParser 所见即所得编辑器</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <!-- 顶部工具栏 -->
        <header class="toolbar">
            <div class="toolbar-left">
                <h1 class="logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                    </svg>
                    MDParser 编辑器
                </h1>
            </div>
            <div class="toolbar-center">
                <div class="format-buttons">
                    <button class="format-btn" data-format="bold" title="粗体 (Ctrl+B)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                            <path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path>
                            <path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path>
                        </svg>
                    </button>
                    <button class="format-btn" data-format="italic" title="斜体 (Ctrl+I)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="19" y1="4" x2="10" y2="4"></line>
                            <line x1="14" y1="20" x2="5" y2="20"></line>
                            <line x1="15" y1="4" x2="9" y2="20"></line>
                        </svg>
                    </button>
                    <button class="format-btn" data-format="strikethrough" title="删除线">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="4" y1="12" x2="20" y2="12"></line>
                            <path d="M17.5 7.5c-1-2-3.5-3.5-6-3.5-3 0-5.5 2-5.5 4.5 0 2 1.5 3.5 3.5 4 0 1.5.5 2.5 2 3"></path>
                        </svg>
                    </button>
                    <span class="separator"></span>
                    <button class="format-btn" data-format="h1" title="标题1">
                        <span class="text-btn">H1</span>
                    </button>
                    <button class="format-btn" data-format="h2" title="标题2">
                        <span class="text-btn">H2</span>
                    </button>
                    <button class="format-btn" data-format="h3" title="标题3">
                        <span class="text-btn">H3</span>
                    </button>
                    <span class="separator"></span>
                    <button class="format-btn" data-format="ul" title="无序列表">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="8" y1="6" x2="21" y2="6"></line>
                            <line x1="8" y1="12" x2="21" y2="12"></line>
                            <line x1="8" y1="18" x2="21" y2="18"></line>
                            <circle cx="4" cy="6" r="1" fill="currentColor"></circle>
                            <circle cx="4" cy="12" r="1" fill="currentColor"></circle>
                            <circle cx="4" cy="18" r="1" fill="currentColor"></circle>
                        </svg>
                    </button>
                    <button class="format-btn" data-format="ol" title="有序列表">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="10" y1="6" x2="21" y2="6"></line>
                            <line x1="10" y1="12" x2="21" y2="12"></line>
                            <line x1="10" y1="18" x2="21" y2="18"></line>
                            <text x="3" y="8" font-size="8" fill="currentColor">1</text>
                            <text x="3" y="14" font-size="8" fill="currentColor">2</text>
                            <text x="3" y="20" font-size="8" fill="currentColor">3</text>
                        </svg>
                    </button>
                    <button class="format-btn" data-format="task" title="任务列表">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="5" width="4" height="4" rx="1"></rect>
                            <line x1="10" y1="7" x2="21" y2="7"></line>
                            <rect x="3" y="13" width="4" height="4" rx="1"></rect>
                            <line x1="10" y1="15" x2="21" y2="15"></line>
                        </svg>
                    </button>
                    <span class="separator"></span>
                    <button class="format-btn" data-format="link" title="链接">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                        </svg>
                    </button>
                    <button class="format-btn" data-format="image" title="图片">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                    </button>
                    <button class="format-btn" data-format="code" title="行内代码">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="16 18 22 12 16 6"></polyline>
                            <polyline points="8 6 2 12 8 18"></polyline>
                        </svg>
                    </button>
                    <button class="format-btn" data-format="codeblock" title="代码块">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                            <polyline points="8 8 5 12 8 16"></polyline>
                            <polyline points="16 8 19 12 16 16"></polyline>
                        </svg>
                    </button>
                    <span class="separator"></span>
                    <button class="format-btn" data-format="blockquote" title="引用">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 17h3l2-4V7H5v6h3zm8 0h3l2-4V7h-6v6h3z"></path>
                        </svg>
                    </button>
                    <button class="format-btn" data-format="hr" title="分割线">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                        </svg>
                    </button>
                    <button class="format-btn" data-format="table" title="表格">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                            <line x1="3" y1="9" x2="21" y2="9"></line>
                            <line x1="3" y1="15" x2="21" y2="15"></line>
                            <line x1="9" y1="3" x2="9" y2="21"></line>
                            <line x1="15" y1="3" x2="15" y2="21"></line>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="toolbar-right">
                <button class="action-btn" id="copyBtn" title="复制HTML">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    复制HTML
                </button>
                <button class="action-btn" id="clearBtn" title="清空">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                    清空
                </button>
                <button class="action-btn primary" id="downloadBtn" title="下载HTML">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    下载
                </button>
            </div>
        </header>

        <!-- 主编辑区域 -->
        <main class="editor-container">
            <!-- 左侧：编辑区 -->
            <div class="editor-panel">
                <div class="panel-header">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                    </svg>
                    <span>编辑器</span>
                </div>
                <textarea 
                    id="editor" 
                    class="editor-textarea"
                    placeholder="在此输入 Markdown 内容..."
                    spellcheck="false"
                ></textarea>
            </div>

            <!-- 分隔线 -->
            <div class="divider" id="divider">
                <div class="divider-handle"></div>
            </div>

            <!-- 右侧：预览区 -->
            <div class="preview-panel">
                <div class="panel-header">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    <span>预览</span>
                    <div class="theme-toggle">
                        <button class="theme-btn active" data-theme="light" title="浅色主题">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="5"></circle>
                                <line x1="12" y1="1" x2="12" y2="3"></line>
                                <line x1="12" y1="21" x2="12" y2="23"></line>
                                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                                <line x1="1" y1="12" x2="3" y2="12"></line>
                                <line x1="21" y1="12" x2="23" y2="12"></line>
                                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                            </svg>
                        </button>
                        <button class="theme-btn" data-theme="dark" title="深色主题">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                <div id="preview" class="preview-content"></div>
            </div>
        </main>

        <!-- 状态栏 -->
        <footer class="statusbar">
            <div class="status-left">
                <span class="status-item">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="4 7 4 4 20 4 20 7"></polyline>
                        <line x1="9" y1="20" x2="15" y2="20"></line>
                        <line x1="12" y1="4" x2="12" y2="20"></line>
                    </svg>
                    <span id="lineCount">1</span> 行
                </span>
                <span class="status-item">
                    <span id="charCount">0</span> 字符
                </span>
            </div>
            <div class="status-center">
                <span class="status-item" id="statusMessage">就绪</span>
            </div>
            <div class="status-right">
                <span class="status-item">MDParser v1.0.0</span>
            </div>
        </footer>
    </div>

    <!-- 工具提示 -->
    <div class="tooltip" id="tooltip"></div>

    <!-- 通知消息 -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="MDParser.js"></script>
    <script src="app.js"></script>
</body>
</html>
